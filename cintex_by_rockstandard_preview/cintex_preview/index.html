
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cintex • Login (Preview)</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
  <div class="container" style="max-width:760px">
    <div class="brandbar">
      <div class="brand">
        <div class="logo"><img src="./rockstandard_logo.jpeg" alt="RockStandard logo"/></div>
        <div>
          <h1>Cintex <span class="small" style="font-weight:800;color:rgba(255,255,255,.75)">by RockStandard</span></h1>
          <p>Diagnostics • Service • Knowledge Base</p>
          <small>Clickable preview • Static mock</small>
        </div>
      </div>
      <div class="actions">
        <button class="btn ghost" id="demoBtn">Use demo login</button>
      </div>
    </div>

    <div class="card">
      <div class="hd">
        <div>
          <h2>Sign in</h2>
          <p>No real authentication — this routes to the dashboard mock.</p>
        </div>
        <span class="badge"><span class="dot"></span> Internal</span>
      </div>
      <div class="bd">
        <div class="form" style="grid-template-columns:1fr;max-width:560px">
          <div class="field">
            <label for="email">Email / Username</label>
            <input id="email" placeholder="tech@rockstandard.com" autocomplete="username"/>
          </div>
          <div class="field">
            <label for="pass">Password</label>
            <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
          </div>
          <div class="row" style="margin-top:6px">
            <button class="btn primary" id="loginBtn">Login</button>
            <button class="btn" id="forgotBtn">Forgot password</button>
          </div>
          <div class="small" style="margin-top:8px">
            Tip: click <span class="mono">Use demo login</span> then <span class="mono">Login</span>.
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>Cintex by RockStandard • Preview</span>
      <span class="mono">v0.2</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const toast = (msg) => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(window.__t);
  window.__t = setTimeout(()=> el.style.display = 'none', 2200);
};

document.getElementById('demoBtn').addEventListener('click', () => {
  document.getElementById('email').value = 'admin@rockstandard.com';
  document.getElementById('pass').value = 'demo';
  toast('Demo credentials filled (admin)');
});

document.getElementById('forgotBtn').addEventListener('click', () => toast('Preview: reset flow not wired'));

document.getElementById('loginBtn').addEventListener('click', () => {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value.trim();
  if(!email || !pass){ toast('Enter email + password'); return; }
  localStorage.setItem('cintex_user', JSON.stringify({
    email,
    role: email.toLowerCase().includes('admin') ? 'admin' : 'tech',
    lastLogin: new Date().toISOString()
  }));
  location.href = './app.html';
});
</script>
</body>
</html>
